<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Study Tracker</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

/* Floating circles */
body::before, body::after {
    content: '';
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    animation: float 6s infinite ease-in-out;
}

body::after {
    bottom: 50px;
    right: 50px;
    animation-delay: 2s;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-40px); }
}

/* Glass Card */
.container {
    width: 350px;
    padding: 40px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
}

h2 {
    margin-bottom: 20px;
    font-size: 28px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #ff6a00, #ee0979);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

/* Message */
#msg {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>📚 Study Tracker</h2>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<script>
async function login() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    if (!email || !password) {
        msg.innerText = "Please enter email & password ⚠️";
        return;
    }

    try {
        const res = await fetch("http://localhost:8081/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email,
                password: password
            })
        });

        const text = await res.text(); // ✔ FIX

        console.log("Response:", text);

        if (res.ok) {
            msg.innerText = "Login Successful ✅";

            localStorage.setItem("user", email);

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1000);

        } else {
            msg.innerText = text || "Invalid Credentials ❌";
        }

    } catch (error) {
        console.log(error);
        msg.innerText = "Server not responding ⚠️ (check backend / CORS / port)";
    }
}
</script>

</body>
</html>
